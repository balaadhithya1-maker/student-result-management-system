<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Student Dashboard</h2>

<button onclick="getResult()">View Result</button>

<p id="result"></p>

<script>
function getResult() {
  fetch("http://127.0.0.1:5001/results/101")
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText =
      "Name: " + data.name +
      " | Total: " + data.total;
  })
}
</script>

</body>
</html>
